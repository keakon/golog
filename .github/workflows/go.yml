name: Go

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    strategy:
      fail-fast: true
      matrix:
        go: [1.18.x, 1.19.x]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os}}

    steps:
    - name: Checkout code
      uses: actions/checkout@master

    - name: Set up Go
      uses: actions/setup-go@master
      with:
        go-version: ${{ matrix.go }}

    - name: Test
      run: |
        go test -race
        go test -covermode=atomic -coverprofile=coverage -benchmem -bench=. . ./log

    - name: Upload code coverage report
      uses: codecov/codecov-action@master
      with:
        files: coverage
        flags: unittests
        name: codecov-golog
        verbose: true
