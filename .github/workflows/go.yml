name: Go

on:
  push:
    paths-ignore:
      - '*.md'
  pull_request:
    paths-ignore:
      - '*.md'

jobs:
  test:
    strategy:
      fail-fast: true
      matrix:
        go: [ '1.19', '1.20' ]
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v3
      with:
        go-version: ${{ matrix.go }}

    - name: Race test
      run: go test -race

    - name: Test with coverage
      if: ${{ matrix.go == '1.20' && matrix.os == 'ubuntu-latest' }}
      run: go test -covermode=atomic -coverprofile=coverage -benchmem -bench=. . ./log

    - name: Upload code coverage report
      if: ${{ matrix.go == '1.20' && matrix.os == 'ubuntu-latest' }}
      uses: codecov/codecov-action@v3
      with:
        files: coverage
        flags: unittests
        verbose: true
